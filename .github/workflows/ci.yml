name: CI

on:
   push:
      branches: [master]
   pull_request:
      branches: [master]

jobs:
   test-api:
      runs-on: self-hosted
      services:
         postgres:
            image: postgres:latest
            env:
               POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
               POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
               POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
            ports:
               - 5432:5432
      env:
         TEST_DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
              python-version: "3.11"
         - run: pip install -r requirements.txt pytest
         - run: pytest app/tests/overall_test.py --cov=app -v

   test-frontend:
      runs-on: self-hosted
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
              python-version: "3.11"
         - run: pip install -r frontend/requirements.txt
         - run: python frontend/app/manage.py test home --settings=task_kyle_app.settings
