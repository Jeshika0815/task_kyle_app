name: CI

on:
   push:
      branches: [master]
   pull_request:
      branches: [master]

jobs:
   test-api:
      runs-on: self-hosted
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
              python-version: "3.11"
         - run: pip install -r requirements.txt -r discord_ver/requirements.txt -r test/requirements.txt
         - run: pytest test/ --cov=app --cov=discord_ver -v

   test-frontend:
      runs-on: self-hosted
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
              python-version: "3.11"
         - run: pip install -r frontend/requirements.txt
         - run: python frontend/app/manage.py test home --settings=task_kyle_app.settings
