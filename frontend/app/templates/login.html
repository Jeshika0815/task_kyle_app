{% extends "base.html" %}
{% block content %}
<section class="kyle_card">
    <h1>ログイン</h1>
    {% if error %}
    <p class="kyle_error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <label>メールアドレス
            <input type="email" name="email" required>
        </label>
        <label>パスワード
            <input type="password" name="password" required>
        </label>
        <button type="submit">ログイン</button>
    </form>
    <p>アカウントをお持ちでない方は <a href="{% url 'signin' %}">新規登録</a></p>
</section>
{% endblock %}
