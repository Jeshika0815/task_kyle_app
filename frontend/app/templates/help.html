{% extends "base.html" %}
{% block content %}
<section class="kyle_card">
    <h1>使い方</h1>
    <ol>
        <li>ログインまたは新規登録をします。</li>
        <li>ホーム画面から「予定を追加」を選び、自然文で予定を入力します（例: 「会議 2026/07/10 14:00 15:30 #仕事」）。</li>
        <li>解析結果を確認・修正してから登録します。</li>
        <li>登録した予定はホーム画面の一覧、または詳細画面から確認・編集・削除できます。</li>
    </ol>
</section>
{% endblock %}
