{% extends "base.html" %}
{% block content %}
<section class="kyle_card">
    <h1>新規登録</h1>
    {% if error %}
    <p class="kyle_error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{% url 'signin' %}">
        {% csrf_token %}
        <label>メールアドレス
            <input type="email" name="email" required>
        </label>
        <label>パスワード
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="kyle_submit">登録する</button>
    </form>
    <p>すでにアカウントをお持ちの方は <a href="{% url 'login' %}">ログイン</a></p>
</section>
{% endblock %}
